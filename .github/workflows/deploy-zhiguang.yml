name: Deploy Zhiguang

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-zhiguang-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy backend and frontend
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        env:
          GIT_CONFIG_COUNT: 2
          GIT_CONFIG_KEY_0: url.https://v4.gh-proxy.org/https://github.com/.insteadOf
          GIT_CONFIG_VALUE_0: https://github.com/
          GIT_CONFIG_KEY_1: http.version
          GIT_CONFIG_VALUE_1: HTTP/1.1
        with:
          fetch-depth: 1
          persist-credentials: false

      - name: Deploy backend on internal server
        env:
          SUDO_PASSWORD: ${{ secrets.INTERNAL_SUDO_PASSWORD }}
          SMTP: ${{ secrets.SMTP }}
        run: bash scripts/deploy/internal-backend.sh

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: zhiguang_fe/zhiguang_fe-main/package-lock.json

      - name: Build frontend
        working-directory: zhiguang_fe/zhiguang_fe-main
        run: |
          npm ci
          npm run build

      - name: Deploy frontend to cloud gateway
        env:
          CLOUD_HOST: ${{ secrets.CLOUD_HOST }}
          CLOUD_USER: ${{ secrets.CLOUD_USER }}
          CLOUD_SSH_KEY: ${{ secrets.CLOUD_SSH_KEY }}
          CLOUD_WEB_ROOT: /var/www/zhiguang-fe
        run: bash scripts/deploy/cloud-frontend.sh zhiguang_fe/zhiguang_fe-main/dist
