services:
  zhiguang-be:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zhiguang-be
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:8080"
    environment:
      JAVA_OPTS: ${JAVA_OPTS:-"-Xms256m -Xmx768m"}
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}
      SPRING_DATA_REDIS_HOST: ${SPRING_DATA_REDIS_HOST}
      SPRING_DATA_REDIS_PORT: ${SPRING_DATA_REDIS_PORT}
      SPRING_DATA_REDIS_PASSWORD: ${SPRING_DATA_REDIS_PASSWORD}
      SPRING_KAFKA_BOOTSTRAP_SERVERS: ${SPRING_KAFKA_BOOTSTRAP_SERVERS}
      SPRING_ELASTICSEARCH_URIS: ${SPRING_ELASTICSEARCH_URIS}
      SPRING_ELASTICSEARCH_USERNAME: ${SPRING_ELASTICSEARCH_USERNAME}
      SPRING_ELASTICSEARCH_PASSWORD: ${SPRING_ELASTICSEARCH_PASSWORD}
      SPRING_AI_VECTORSTORE_ELASTICSEARCH_INDEX_NAME: ${SPRING_AI_VECTORSTORE_ELASTICSEARCH_INDEX_NAME}
      SPRING_AI_OPENAI_CHAT_BASE_URL: ${SPRING_AI_OPENAI_CHAT_BASE_URL}
      SPRING_AI_OPENAI_CHAT_API_KEY: ${SPRING_AI_OPENAI_CHAT_API_KEY}
      SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL: ${SPRING_AI_OPENAI_CHAT_OPTIONS_MODEL}
      SPRING_AI_OPENAI_EMBEDDING_BASE_URL: ${SPRING_AI_OPENAI_EMBEDDING_BASE_URL}
      SPRING_AI_OPENAI_EMBEDDING_API_KEY: ${SPRING_AI_OPENAI_EMBEDDING_API_KEY}
      SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL: ${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_MODEL}
      SPRING_AI_OPENAI_EMBEDDING_OPTIONS_DIMENSIONS: ${SPRING_AI_OPENAI_EMBEDDING_OPTIONS_DIMENSIONS}
      RAG_RERANK_ENABLED: ${RAG_RERANK_ENABLED}
      RAG_RERANK_BASE_URL: ${RAG_RERANK_BASE_URL}
      RAG_RERANK_API_KEY: ${RAG_RERANK_API_KEY}
      RAG_RERANK_MODEL: ${RAG_RERANK_MODEL}
      RAG_RERANK_PATH: ${RAG_RERANK_PATH}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_PUBLIC_DOMAIN: ${MINIO_PUBLIC_DOMAIN}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      CANAL_ENABLED: ${CANAL_ENABLED:-false}
      CANAL_HOST: ${CANAL_HOST:-canal}
      CANAL_PORT: ${CANAL_PORT:-11111}
      CANAL_DESTINATION: ${CANAL_DESTINATION:-example}
      CANAL_USERNAME: ${CANAL_USERNAME:-canal}
      CANAL_PASSWORD: ${CANAL_PASSWORD:-change-me}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_started
      elasticsearch:
        condition: service_healthy
      minio:
        condition: service_started

  mysql:
    image: mysql:8.4
    container_name: zhiguang-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-zhiguang_auth}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./db/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7.2
    container_name: zhiguang-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes", "--requirepass", "${SPRING_DATA_REDIS_PASSWORD}"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${SPRING_DATA_REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  kafka:
    image: bitnamilegacy/kafka:4.0.0
    container_name: zhiguang-kafka
    restart: unless-stopped
    ports:
      - "9092:9092"
    environment:
      ALLOW_PLAINTEXT_LISTENER: "yes"
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_MESSAGE_MAX_BYTES: 10485760
      KAFKA_CFG_FETCH_MESSAGE_MAX_BYTES: 10485760
      KAFKA_CFG_PARTITION_FETCH_BYTES: 10485760
      KAFKA_CFG_REPLICA_FETCH_MAX_BYTES: 10485760
      KAFKA_CFG_MAX_REQUEST_SIZE: 10485760
      KAFKA_HEAP_OPTS: -Xms512m -Xmx1g
    volumes:
      - kafka-data:/bitnami/kafka

  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.2
    container_name: zhiguang-elasticsearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      xpack.security.enabled: "true"
      ELASTIC_PASSWORD: ${SPRING_ELASTICSEARCH_PASSWORD}
      ES_JAVA_OPTS: -Xms512m -Xmx1g
    ports:
      - "9200:9200"
    volumes:
      - es-data:/usr/share/elasticsearch/data
    healthcheck:
      test: ["CMD-SHELL", "curl -fs -u elastic:$${ELASTIC_PASSWORD} http://localhost:9200 >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 20

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    container_name: zhiguang-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  mysql-data:
  redis-data:
  kafka-data:
  es-data:
  minio-data:
