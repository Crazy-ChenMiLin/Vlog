name: Graph RAG evaluation

on:
  workflow_dispatch:
    inputs:
      questions:
        description: "Question set file"
        required: true
        default: "scripts/rag-eval/questions-relation-cache-100.json"
      spec:
        description: "Relation spec file"
        required: true
        default: "scripts/rag-eval/relation-spec-100.json"
      top_k:
        description: "Debug retrieval topK"
        required: true
        default: "10"
      run_name:
        description: "Output run name"
        required: false
        default: ""
      off_port:
        description: "Backend port for graph-off"
        required: true
        default: "18221"
      on_port:
        description: "Backend port for graph-on"
        required: true
        default: "18222"
      graph_understanding_enabled:
        description: "Enable LLM query understanding before Neo4j lookup"
        required: true
        default: "true"

concurrency:
  group: graph-rag-eval
  cancel-in-progress: false

jobs:
  graph-rag-eval:
    name: Run Graph On/Off A/B evaluation
    runs-on: self-hosted
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r scripts/rag-eval/requirements.txt

      - name: Import RAG eval environment
        shell: pwsh
        env:
          RAG_EVAL_ENV: ${{ secrets.RAG_EVAL_ENV }}
        run: |
          if ($env:RAG_EVAL_ENV -eq "") {
            Write-Host "RAG_EVAL_ENV is empty; using repository/application defaults."
            exit 0
          }
          foreach ($line in $env:RAG_EVAL_ENV -split "`n") {
            $trimmed = $line.Trim()
            if ($trimmed -eq "" -or $trimmed.StartsWith("#")) {
              continue
            }
            $parts = $trimmed -split "=", 2
            if ($parts.Length -ne 2) {
              continue
            }
            $name = $parts[0].Trim()
            $value = $parts[1].Trim()
            Add-Content -Path $env:GITHUB_ENV -Value "$name=$value"
          }

      - name: Run Graph RAG A/B evaluation
        shell: pwsh
        run: |
          $runName = "${{ inputs.run_name }}"
          if ($runName -eq "") {
            $runName = "github-graph-rag-${{ github.run_id }}"
          }

          ./scripts/rag-eval/run-graph-ab.ps1 `
            -RunName $runName `
            -Questions "${{ inputs.questions }}" `
            -Spec "${{ inputs.spec }}" `
            -TopK ${{ inputs.top_k }} `
            -OffPort ${{ inputs.off_port }} `
            -OnPort ${{ inputs.on_port }} `
            -GraphUnderstandingEnabled "${{ inputs.graph_understanding_enabled }}" `
            -RequestRetries 3 `
            -RetryDelaySeconds 2

      - name: Upload Graph RAG eval report
        uses: actions/upload-artifact@v4
        with:
          name: graph-rag-eval-${{ github.run_id }}
          path: target/rag-eval/**
          if-no-files-found: error
